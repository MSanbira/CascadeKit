<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/CascadeKit/CascadeKitFavicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CascadeKit - A modern CSS architecture using native cascade layers and component co-location"
    />
    <title>CascadeKit - CSS Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Handle GitHub Pages SPA redirect
      (function() {
        const params = new URLSearchParams(window.location.search);
        const path = params.get('p');
        if (path) {
          // Restore the clean URL: /CascadeKit/?p=/why → /CascadeKit/why
          window.history.replaceState(null, '', '/CascadeKit' + path);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
